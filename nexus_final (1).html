<style>
  :root{
    --bg:#04060d;
    --panel: rgba(16,22,40,0.6);
    --panel-hi: rgba(22,30,52,0.88);
    --stroke: rgba(120,170,255,0.18);
    --stroke-hi: rgba(120,170,255,0.45);
    --glow:#3d7bff;
    --glow-soft:#62a0ff;
    --text:#eaf0ff;
    --muted:#8593b8;
    --danger:#ff5577;
    --danger-dim: rgba(255,85,119,0.4);
    --radius:20px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(1000px 600px at 72% -6%, rgba(61,123,255,0.16), transparent 60%),
      radial-gradient(900px 700px at 10% 100%, rgba(120,80,255,0.13), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
  }
  #app{ width:100%; max-width:520px; min-height:100vh; display:flex; flex-direction:column; position:relative; }

  header{
    position:sticky; top:0; z-index:20; padding:16px 18px 14px;
    background:linear-gradient(180deg, rgba(4,6,13,0.97), rgba(4,6,13,0.85));
    backdrop-filter:blur(14px); border-bottom:1px solid var(--stroke);
  }
  header .title-row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .brand{display:flex; align-items:center; gap:10px;}
  .logo-mark{ width:32px; height:32px; position:relative; flex-shrink:0; }
  .logo-mark .ring{ position:absolute; inset:-6px; border:1px solid var(--stroke-hi); border-radius:9px; transform:rotate(45deg); opacity:0.6; }
  .logo-mark .diamond{
    position:absolute; inset:0; border-radius:9px; transform:rotate(45deg);
    background:linear-gradient(135deg, var(--glow), var(--glow-soft));
    box-shadow:0 0 16px rgba(61,123,255,0.65);
    display:flex; align-items:center; justify-content:center;
  }
  .logo-mark .diamond span{ transform:rotate(-45deg); font-family:'Orbitron',sans-serif; font-weight:900; color:#04060d; font-size:14px; }
  header h1{ font-family:'Orbitron', sans-serif; font-weight:900; font-size:18px; letter-spacing:3px; margin:0; color:var(--text); }
  .status-pill{ display:flex; align-items:center; gap:6px; font-size:10.5px; color:var(--muted); border:1px solid var(--stroke); border-radius:999px; padding:5px 10px; background:rgba(0,0,0,0.25); }
  .dot{width:7px; height:7px; border-radius:50%; background:var(--muted);}
  .dot.on{background:var(--glow-soft); box-shadow:0 0 8px var(--glow-soft); animation:pulse 2s ease-in-out infinite;}
  .dot.err{background:var(--danger); box-shadow:0 0 8px var(--danger);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.45;}}

  main{flex:1; padding:16px 16px 92px; overflow-y:auto;}
  .card{ background:var(--panel); border:1px solid var(--stroke); border-radius:var(--radius); padding:18px; margin-bottom:14px; backdrop-filter:blur(16px) saturate(140%); box-shadow:0 20px 50px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.05); }
  .card.glow{border-color:var(--stroke-hi); box-shadow:0 0 26px rgba(61,123,255,0.12), inset 0 1px 0 rgba(255,255,255,0.05);}
  .eyebrow{ font-family:'Orbitron', sans-serif; font-size:10px; letter-spacing:2.5px; color:var(--glow-soft); text-transform:uppercase; margin:0 0 10px; }
  h2{font-family:'Orbitron', sans-serif; font-size:15px; letter-spacing:1px; margin:0 0 12px; color:var(--text);}
  p{line-height:1.6; color:var(--muted); font-size:13.5px; margin:0 0 10px;}
  label{display:block; font-size:11px; color:var(--muted); margin:10px 0 5px; letter-spacing:0.4px;}
  input, textarea{
    width:100%; background:rgba(4,6,13,0.55); border:1px solid var(--stroke); border-radius:10px;
    padding:11px 12px; color:var(--text); font-family:'Inter', sans-serif; font-size:14.5px; outline:none; transition:border-color .15s;
  }
  input:focus, textarea:focus{border-color:var(--glow-soft);}
  textarea{resize:vertical; min-height:80px;}
  button{
    font-family:'Orbitron', sans-serif; font-size:11.5px; letter-spacing:1px;
    border-radius:10px; padding:12px 16px; border:1px solid var(--stroke-hi);
    background:linear-gradient(135deg, rgba(61,123,255,0.16), rgba(98,160,255,0.08));
    color:var(--glow-soft); cursor:pointer; transition:all .15s; width:100%; margin-top:12px; text-transform:uppercase;
  }
  button:active{transform:scale(0.98);}
  button:disabled{opacity:0.5;}
  button:hover{background:linear-gradient(135deg, rgba(61,123,255,0.28), rgba(98,160,255,0.14));}
  button.secondary{background:transparent; color:var(--muted); border-color:var(--stroke);}
  button.danger{background:rgba(255,85,119,0.08); color:var(--danger); border-color:var(--danger-dim);}
  button.small{width:auto; padding:8px 12px; font-size:10px; margin-top:0;}
  button.link{background:none; border:none; color:var(--glow-soft); width:auto; margin-top:8px; text-decoration:underline; padding:4px 0;}
  .row{display:flex; gap:10px;}
  .row > *{flex:1;}
  .error-box{ background:rgba(255,85,119,0.1); border:1px solid var(--danger-dim); color:#ffb3c5; font-size:12px; padding:10px 12px; border-radius:10px; margin-top:10px; }
  .empty{ text-align:center; padding:44px 20px; color:var(--muted); font-size:13px; }
  .empty .glyph{font-size:28px; display:block; margin-bottom:10px; opacity:0.6;}
  .profile-head{display:flex; align-items:center; gap:12px; margin-bottom:6px;}
  .avatar{ width:44px; height:44px; border-radius:12px; background:linear-gradient(135deg, var(--glow), var(--glow-soft)); display:flex; align-items:center; justify-content:center; font-family:'Orbitron',sans-serif; font-weight:900; font-size:17px; color:#04060d; }
  .pseudo{font-family:'Orbitron',sans-serif; font-size:15px; color:var(--text);}
  .meta{font-size:11px; color:var(--muted);}

  .post{ background:var(--panel); border:1px solid var(--stroke); border-left:3px solid var(--glow); border-radius:14px; padding:14px; margin-bottom:12px; cursor:pointer; }
  .post.mine{border-left-color:var(--glow-soft); box-shadow:0 0 18px rgba(61,123,255,0.1);}
  .post-top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; gap:8px;}
  .post-title{font-family:'Orbitron',sans-serif; font-size:13px; color:var(--text); flex:1;}
  .post-date{font-size:10px; color:var(--muted); white-space:nowrap;}
  .post-author{font-size:11px; color:var(--glow-soft); margin-bottom:6px;}
  .post-preview{font-size:12.5px; color:var(--muted); line-height:1.55; margin:0;}
  .post-foot{display:flex; gap:14px; margin-top:10px; font-size:10.5px; color:var(--muted);}
  .comment{ border-top:1px solid var(--stroke); padding:10px 0; font-size:12.5px; }
  .comment .c-head{font-size:10.5px; color:var(--glow-soft); margin-bottom:4px;}
  mark{background:rgba(61,123,255,0.3); color:var(--text); border-radius:3px; padding:0 2px;}

  .bm{ background:var(--panel); border:1px solid var(--stroke); border-radius:14px; padding:13px 14px; margin-bottom:10px; }
  .bm-top{display:flex; justify-content:space-between; align-items:baseline; gap:8px;}
  .bm-title{font-family:'Orbitron',sans-serif; font-size:12.5px; color:var(--text);}
  .bm-date{font-size:10px; color:var(--muted); white-space:nowrap;}
  .bm-content{font-size:12.5px; color:var(--muted); margin-top:5px; word-break:break-word;}
  .bm-content a{color:var(--glow-soft);}

  nav.tabbar{
    position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:520px; display:flex; z-index:30;
    background:rgba(4,6,13,0.95); backdrop-filter:blur(14px); border-top:1px solid var(--stroke);
    padding:8px 4px calc(8px + env(safe-area-inset-bottom));
  }
  nav.tabbar button.tab{ flex:1; background:none; border:none; width:auto; margin:0; display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--muted); font-family:'Orbitron',sans-serif; font-size:8.5px; letter-spacing:0.5px; padding:6px 2px; border-radius:10px; }
  nav.tabbar button.tab .icon{font-size:18px;}
  nav.tabbar button.tab.active{color:var(--glow-soft); background:rgba(61,123,255,0.1);}
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--stroke-hi); border-radius:4px;}

  /* ---- suppression de compte : animation ---- */
  .erase-overlay{ position:fixed; inset:0; z-index:999; background:#000; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .erase-bomb{ position:absolute; top:-60px; font-size:44px; filter:drop-shadow(0 0 10px var(--glow-soft)); animation:eraseFall 0.6s cubic-bezier(.55,0,1,.45) forwards; }
  @keyframes eraseFall{ 0%{ top:-60px; transform:rotate(-15deg); } 100%{ top:48%; transform:rotate(25deg); } }
  .erase-flash{ position:absolute; inset:0; background:#fff; opacity:0; animation:eraseFlash 0.35s ease-out 0.6s forwards; }
  @keyframes eraseFlash{ 0%{opacity:0;} 30%{opacity:1;} 100%{opacity:0;} }
  .erase-ring{ position:absolute; left:50%; top:50%; border-radius:50%; border:2px solid var(--glow-soft); box-shadow:0 0 30px var(--glow-soft); transform:translate(-50%,-50%) scale(0); opacity:0; }
  .erase-ring.r1{ width:60px; height:60px; border-color:#fff; animation:eraseRing 1.1s ease-out 0.85s forwards; }
  .erase-ring.r2{ width:60px; height:60px; border-color:var(--glow-soft); animation:eraseRing 1.5s ease-out 1.0s forwards; }
  .erase-ring.r3{ width:60px; height:60px; border-color:var(--danger); animation:eraseRing 1.9s ease-out 1.15s forwards; }
  @keyframes eraseRing{ 0%{ transform:translate(-50%,-50%) scale(0.3); opacity:0.9; } 100%{ transform:translate(-50%,-50%) scale(9); opacity:0; } }
  .erase-ember{ position:absolute; bottom:46%; width:5px; height:5px; border-radius:50%; background:var(--glow-soft); box-shadow:0 0 8px var(--glow-soft); opacity:0; animation-name:eraseEmber; animation-timing-function:ease-out; animation-fill-mode:forwards; }
  @keyframes eraseEmber{ 0%{ opacity:0; transform:translateY(0) scale(1); } 15%{ opacity:1; } 100%{ opacity:0; transform:translateY(-160px) scale(0.3); } }
  .erase-log{ position:absolute; bottom:14%; left:50%; transform:translateX(-50%); font-family:'Inter',monospace; font-size:12px; color:var(--glow-soft); text-shadow:0 0 6px var(--glow-soft); text-align:left; min-width:230px; line-height:1.8; }

  /* ---- écran de config ---- */
  .setup-wrap{ padding:60px 20px; text-align:center; }
  .setup-wrap .logo-mark{ width:56px; height:56px; margin:0 auto 20px; }
  .setup-wrap .logo-mark .diamond span{ font-size:24px; }
</style>

<body>
<div id="app">
  <header>
    <div class="title-row">
      <div class="brand">
        <div class="logo-mark"><div class="ring"></div><div class="diamond"><span>N</span></div></div>
        <h1>NEXUS</h1>
      </div>
      <div class="status-pill" id="statusPill"><span class="dot" id="statusDot"></span><span id="statusText">...</span></div>
    </div>
  </header>
  <main id="main"></main>
  <nav class="tabbar">
    <button class="tab" data-tab="forum"><span class="icon">💬</span>FORUM</button>
    <button class="tab" data-tab="recherche"><span class="icon">🔍</span>RECHERCHE</button>
    <button class="tab" data-tab="favoris"><span class="icon">⭐</span>FAVORIS</button>
    <button class="tab" data-tab="compte"><span class="icon">👤</span>COMPTE</button>
  </nav>
</div>

<script>
(function(){
  "use strict";

  if (SUPABASE_URL.indexOf("COLLE_TON") !== -1){
    document.getElementById("main").innerHTML =
      '<div class="setup-wrap">' +
        '<div class="logo-mark"><div class="ring"></div><div class="diamond"><span>N</span></div></div>' +
        '<h2 style="margin-bottom:10px;">Configuration requise</h2>' +
        '<p>Ouvre ce fichier, et remplace <b>SUPABASE_URL</b> et <b>SUPABASE_KEY</b> tout en haut par les valeurs de ton projet Supabase (Project Settings → API). Une fois fait, recharge la page.</p>' +
      '</div>';
    return;
  }

  var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  var FAKE_DOMAIN = "@nexus.local";

  var state = {
    tab: "forum",
    session: null,
    profile: null,
    posts: [],
    bookmarks: [],
    loaded: false,
    loadError: null,
    openPostId: null,
    authMode: "login",
    authError: "",
    authBusy: false,
    searchQuery: "",
    searchResults: null,
    searchBusy: false,
    forumDraft: false,
    bmDraft: false,
  };

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; });
  }
  function fmtDate(ts){
    var d = new Date(ts);
    var now = new Date();
    var sameDay = d.toDateString() === now.toDateString();
    var time = d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
    if (sameDay) return time;
    return d.toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit'}) + " " + time;
  }
  function highlight(text, query){
    var esc = escapeHtml(text);
    if (!query) return esc;
    var q = query.trim();
    if (!q) return esc;
    var escQ = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    var re = new RegExp("(" + escQ + ")", "ig");
    return esc.replace(re, "<mark>$1</mark>");
  }
  function initials(pseudo){ return (pseudo || "?").trim().slice(0,1).toUpperCase(); }
  function linkify(text){
    var esc = escapeHtml(text);
    return esc.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  }

  // ---------------- data loading ----------------
  async function loadProfile(userId){
    var res = await sb.from("profiles").select("*").eq("id", userId).single();
    if (res.error) throw res.error;
    return res.data;
  }

  async function loadPosts(){
    var res = await sb
      .from("posts")
      .select("id, title, content, created_at, author_id, profiles(username,pseudo), comments(id, content, created_at, author_id, profiles(username,pseudo))")
      .order("created_at", { ascending: false });
    if (res.error) throw res.error;
    return res.data.map(function(p){
      p.comments = (p.comments || []).sort(function(a,b){ return new Date(a.created_at) - new Date(b.created_at); });
      return p;
    });
  }

  async function loadBookmarks(){
    if (!state.session) return [];
    var res = await sb.from("bookmarks").select("*").order("created_at", { ascending: false });
    if (res.error) throw res.error;
    return res.data;
  }

  async function refreshEverything(){
    try{
      state.posts = await loadPosts();
      state.bookmarks = await loadBookmarks();
      state.loadError = null;
    }catch(err){
      state.loadError = "Connexion au serveur impossible (" + (err.message || "erreur inconnue") + ").";
    }
    state.loaded = true;
    render();
  }

  async function init(){
    try{
      var sess = await sb.auth.getSession();
      state.session = sess.data.session || null;
      if (state.session){
        state.profile = await loadProfile(state.session.user.id);
      }
    }catch(e){ /* pas connecté, pas grave */ }
    await refreshEverything();

    sb.auth.onAuthStateChange(async function(event, session){
      state.session = session;
      if (session){
        try{ state.profile = await loadProfile(session.user.id); }catch(e){ state.profile = null; }
      } else {
        state.profile = null;
        state.bookmarks = [];
      }
      render();
    });
  }

  // ---------------- render root ----------------
  function render(){
    var dot = document.getElementById("statusDot");
    var txt = document.getElementById("statusText");
    if (!state.loaded){ dot.className = "dot"; txt.textContent = "connexion..."; }
    else if (state.loadError){ dot.className = "dot err"; txt.textContent = "hors ligne"; }
    else if (state.profile){ dot.className = "dot on"; txt.textContent = state.profile.pseudo; }
    else { dot.className = "dot"; txt.textContent = "non connecté"; }

    document.querySelectorAll("nav.tabbar .tab").forEach(function(b){ b.classList.toggle("active", b.dataset.tab === state.tab); });

    var main = document.getElementById("main");
    if (!state.loaded){ main.innerHTML = '<div class="empty"><span class="glyph">◌</span>Chargement de Nexus...</div>'; return; }
    if (state.loadError){
      main.innerHTML = '<div class="card"><h2>⚠ Connexion impossible</h2><p>' + escapeHtml(state.loadError) + '</p><button id="retryBtn">Réessayer</button></div>';
      document.getElementById("retryBtn").onclick = function(){ state.loaded = false; render(); refreshEverything(); };
      return;
    }

    if (state.tab === "forum") main.innerHTML = renderForum();
    else if (state.tab === "recherche") main.innerHTML = renderSearch();
    else if (state.tab === "favoris") main.innerHTML = renderFavoris();
    else main.innerHTML = renderCompte();

    bindEvents();
  }

  // ---------------- FORUM ----------------
  function renderPostCard(post, opts){
    opts = opts || {};
    var isOpen = state.openPostId === post.id;
    var isMine = state.session && state.session.user.id === post.author_id;
    var q = opts.query || "";
    var pseudo = post.profiles ? post.profiles.pseudo : "compte supprimé";
    var commentsCount = (post.comments || []).length;

    var html = '<div class="post ' + (isMine ? "mine" : "") + '" data-post="' + post.id + '">';
    html += '<div class="post-top"><div class="post-title">' + highlight(post.title, q) + '</div><div class="post-date">' + fmtDate(post.created_at) + '</div></div>';
    html += '<div class="post-author">@' + escapeHtml(pseudo) + '</div>';
    if (!isOpen){
      var preview = post.content.length > 110 ? post.content.slice(0,110) + "…" : post.content;
      html += '<p class="post-preview">' + highlight(preview, q) + '</p>';
      html += '<div class="post-foot"><span>💬 ' + commentsCount + '</span></div>';
    } else {
      html += '<p class="post-preview">' + highlight(post.content, q) + '</p>';
      if (isMine) html += '<button class="danger small" data-del-post="' + post.id + '" style="margin-top:8px;">Supprimer le sujet</button>';
      html += '<div style="margin-top:10px;">';
      (post.comments || []).forEach(function(c){
        var cPseudo = c.profiles ? c.profiles.pseudo : "compte supprimé";
        html += '<div class="comment"><div class="c-head">@' + escapeHtml(cPseudo) + ' · ' + fmtDate(c.created_at) + '</div>' + escapeHtml(c.content) + '</div>';
      });
      html += '</div>';
      if (state.profile){
        html += '<label>Répondre</label><textarea id="commentInput-' + post.id + '" placeholder="Écris ta réponse..." rows="2"></textarea>';
        html += '<button data-comment="' + post.id + '">Envoyer</button>';
      } else {
        html += '<p style="margin-top:10px;">Connecte-toi (onglet Compte) pour répondre.</p>';
      }
    }
    html += '</div>';
    return html;
  }

  function renderForum(){
    var html = '<div class="card glow"><p class="eyebrow">Fil d\'actualité</p>';
    if (!state.profile){
      html += '<p>Tu peux lire le forum librement. Connecte-toi pour poster.</p>';
    } else if (!state.forumDraft){
      html += '<button id="newPostBtn">+ Nouveau sujet</button>';
    } else {
      html += '<label>Titre</label><input id="npTitle" placeholder="De quoi tu veux parler ?" maxlength="80">';
      html += '<label>Message</label><textarea id="npContent" placeholder="Écris ton message..." rows="4"></textarea>';
      html += '<div class="row"><button id="npSubmit">Publier</button><button class="secondary" id="npCancel">Annuler</button></div>';
      html += '<div id="npError"></div>';
    }
    html += '</div>';

    if (state.posts.length === 0){
      html += '<div class="empty"><span class="glyph">💬</span>Aucun sujet pour le moment.<br>Sois le premier à écrire !</div>';
    } else {
      state.posts.forEach(function(p){ html += renderPostCard(p); });
    }
    return html;
  }

  // ---------------- RECHERCHE ----------------
  function renderSearch(){
    var html = '<div class="card glow"><p class="eyebrow">Recherche</p>';
    html += '<input id="searchInput" placeholder="Rechercher un sujet, un mot, un pseudo..." value="' + escapeHtml(state.searchQuery) + '">';
    html += '</div>';

    var q = state.searchQuery.trim();
    if (!q){ html += '<div class="empty"><span class="glyph">🔍</span>Tape un mot-clé pour chercher dans le forum et tes favoris.</div>'; return html; }
    if (state.searchBusy){ html += '<div class="empty"><span class="glyph">◌</span>Recherche...</div>'; return html; }

    var results = state.searchResults || { posts: [], bookmarks: [] };
    var total = results.posts.length + results.bookmarks.length;
    if (total === 0){
      html += '<div class="empty"><span class="glyph">∅</span>Aucun résultat pour "' + escapeHtml(q) + '".</div>';
      return html;
    }
    html += '<p style="margin:0 0 10px; font-size:11px;">' + total + ' résultat(s)</p>';
    results.posts.forEach(function(p){ html += renderPostCard(p, {query: q}); });
    results.bookmarks.forEach(function(b){ html += renderBookmarkCard(b, q); });
    return html;
  }

  var searchDebounce = null;
  function runSearch(q){
    clearTimeout(searchDebounce);
    if (!q.trim()){ state.searchResults = null; render(); return; }
    state.searchBusy = true;
    searchDebounce = setTimeout(async function(){
      var out = { posts: [], bookmarks: [] };
      try{
        var res = await sb.from("posts")
          .select("id, title, content, created_at, author_id, profiles(username,pseudo), comments(id, content, created_at, author_id, profiles(username,pseudo))")
          .or("title.ilike.%" + q + "%,content.ilike.%" + q + "%")
          .order("created_at", { ascending: false });
        if (!res.error) out.posts = res.data;
      }catch(e){}
      if (state.session){
        try{
          var res2 = await sb.from("bookmarks").select("*")
            .or("title.ilike.%" + q + "%,content.ilike.%" + q + "%")
            .order("created_at", { ascending: false });
          if (!res2.error) out.bookmarks = res2.data;
        }catch(e){}
      }
      state.searchResults = out;
      state.searchBusy = false;
      render();
      var el = document.getElementById("searchInput");
      if (el){ el.focus(); el.setSelectionRange(el.value.length, el.value.length); }
    }, 350);
  }

  // ---------------- FAVORIS ----------------
  function renderBookmarkCard(b, query){
    var html = '<div class="bm" data-bm="' + b.id + '">';
    html += '<div class="bm-top"><div class="bm-title">' + highlight(b.title, query) + '</div><div class="bm-date">' + fmtDate(b.created_at) + '</div></div>';
    html += '<div class="bm-content">' + (query ? highlight(b.content, query) : linkify(b.content)) + '</div>';
    html += '<button class="danger small" data-del-bm="' + b.id + '" style="margin-top:8px;">Supprimer</button>';
    html += '</div>';
    return html;
  }

  function renderFavoris(){
    if (!state.profile){
      return '<div class="card glow"><p class="eyebrow">Favoris</p><p>Connecte-toi (onglet Compte) pour garder des liens et notes accessibles depuis n\'importe quel appareil — même en vacances, sans ton PC.</p></div>';
    }
    var html = '<div class="card glow"><p class="eyebrow">Nouveau favori</p>';
    if (!state.bmDraft){
      html += '<button id="newBmBtn">+ Ajouter un lien ou une note</button>';
    } else {
      html += '<label>Titre</label><input id="bmTitle" placeholder="Ex : Idée pour Nexus, lien utile..." maxlength="80">';
      html += '<label>Lien ou note</label><textarea id="bmContent" placeholder="Colle un lien ou écris une note..." rows="3"></textarea>';
      html += '<div class="row"><button id="bmSubmit">Enregistrer</button><button class="secondary" id="bmCancel">Annuler</button></div>';
      html += '<div id="bmError"></div>';
    }
    html += '</div>';

    if (state.bookmarks.length === 0){
      html += '<div class="empty"><span class="glyph">⭐</span>Aucun favori pour le moment.</div>';
    } else {
      state.bookmarks.forEach(function(b){ html += renderBookmarkCard(b); });
    }
    return html;
  }

  // ---------------- COMPTE ----------------
  function renderCompte(){
    if (state.profile){
      var myPosts = state.posts.filter(function(p){ return p.author_id === state.session.user.id; }).length;
      var html = '<div class="card glow">';
      html += '<div class="profile-head"><div class="avatar">' + initials(state.profile.pseudo) + '</div><div><div class="pseudo">' + escapeHtml(state.profile.pseudo) + '</div><div class="meta">@' + escapeHtml(state.profile.username) + '</div></div></div>';
      html += '<p class="meta" style="margin-top:8px;">Membre depuis le ' + new Date(state.profile.created_at).toLocaleDateString('fr-FR') + ' · ' + myPosts + ' sujet(s) · ' + state.bookmarks.length + ' favori(s)</p>';
      html += '<button id="logoutBtn" class="secondary">Se déconnecter</button>';
      html += '</div>';
      html += '<div class="card"><p class="eyebrow">Zone danger</p><p>Supprimer ton compte est définitif : ton profil est effacé, tes sujets et réponses restent visibles signés "compte supprimé".</p><button id="deleteAccBtn" class="danger">Supprimer définitivement mon compte</button></div>';
      return html;
    }

    var html2 = '<div class="card glow">';
    html2 += '<p class="eyebrow">' + (state.authMode === "login" ? "Connexion" : "Créer un compte") + '</p>';
    html2 += '<label>Identifiant</label><input id="authUsername" placeholder="ton_pseudo_technique" autocapitalize="off">';
    if (state.authMode === "register") html2 += '<label>Pseudo affiché</label><input id="authPseudo" placeholder="Comment on t\'appelle">';
    html2 += '<label>Mot de passe</label><input id="authPassword" type="password" placeholder="••••••••">';
    if (state.authMode === "register") html2 += '<label>Confirme le mot de passe</label><input id="authPassword2" type="password" placeholder="••••••••">';
    html2 += '<button id="authSubmit" ' + (state.authBusy ? "disabled" : "") + '>' + (state.authBusy ? "..." : (state.authMode === "login" ? "Se connecter" : "Créer le compte")) + '</button>';
    if (state.authError) html2 += '<div class="error-box">' + escapeHtml(state.authError) + '</div>';
    html2 += '<button class="link" id="authToggle">' + (state.authMode === "login" ? "Pas encore de compte ? Créer un compte" : "Déjà un compte ? Se connecter") + '</button>';
    html2 += '</div>';
    return html2;
  }

  // ---------------- events ----------------
  function bindEvents(){
    var main = document.getElementById("main");

    var newPostBtn = document.getElementById("newPostBtn");
    if (newPostBtn) newPostBtn.onclick = function(){ state.forumDraft = true; render(); };
    var npCancel = document.getElementById("npCancel");
    if (npCancel) npCancel.onclick = function(){ state.forumDraft = false; render(); };
    var npSubmit = document.getElementById("npSubmit");
    if (npSubmit) npSubmit.onclick = async function(){
      var title = document.getElementById("npTitle").value.trim();
      var content = document.getElementById("npContent").value.trim();
      if (!title || !content){ document.getElementById("npError").innerHTML = '<div class="error-box">Titre et message obligatoires.</div>'; return; }
      npSubmit.disabled = true; npSubmit.textContent = "...";
      var res = await sb.from("posts").insert({ title: title, content: content, author_id: state.session.user.id });
      if (res.error){ document.getElementById("npError").innerHTML = '<div class="error-box">' + escapeHtml(res.error.message) + '</div>'; npSubmit.disabled=false; npSubmit.textContent="Publier"; return; }
      state.forumDraft = false;
      state.posts = await loadPosts();
      render();
    };

    main.querySelectorAll(".post").forEach(function(el){
      el.addEventListener("click", function(e){
        if (e.target.closest("textarea, button, input")) return;
        var id = el.dataset.post;
        state.openPostId = (state.openPostId === id) ? null : id;
        render();
      });
    });

    main.querySelectorAll("[data-del-post]").forEach(function(btn){
      btn.addEventListener("click", async function(e){
        e.stopPropagation();
        if (!confirm("Supprimer ce sujet et toutes ses réponses ?")) return;
        var id = btn.dataset.delPost;
        await sb.from("posts").delete().eq("id", id);
        state.openPostId = null;
        state.posts = await loadPosts();
        render();
      });
    });

    main.querySelectorAll("[data-comment]").forEach(function(btn){
      btn.addEventListener("click", async function(e){
        e.stopPropagation();
        var id = btn.dataset.comment;
        var input = document.getElementById("commentInput-" + id);
        var text = input.value.trim();
        if (!text) return;
        btn.disabled = true; btn.textContent = "...";
        await sb.from("comments").insert({ post_id: id, content: text, author_id: state.session.user.id });
        state.posts = await loadPosts();
        render();
      });
    });

    // favoris
    var newBmBtn = document.getElementById("newBmBtn");
    if (newBmBtn) newBmBtn.onclick = function(){ state.bmDraft = true; render(); };
    var bmCancel = document.getElementById("bmCancel");
    if (bmCancel) bmCancel.onclick = function(){ state.bmDraft = false; render(); };
    var bmSubmit = document.getElementById("bmSubmit");
    if (bmSubmit) bmSubmit.onclick = async function(){
      var title = document.getElementById("bmTitle").value.trim();
      var content = document.getElementById("bmContent").value.trim();
      if (!title || !content){ document.getElementById("bmError").innerHTML = '<div class="error-box">Titre et contenu obligatoires.</div>'; return; }
      bmSubmit.disabled = true; bmSubmit.textContent = "...";
      var res = await sb.from("bookmarks").insert({ title: title, content: content, owner_id: state.session.user.id });
      if (res.error){ document.getElementById("bmError").innerHTML = '<div class="error-box">' + escapeHtml(res.error.message) + '</div>'; bmSubmit.disabled=false; bmSubmit.textContent="Enregistrer"; return; }
      state.bmDraft = false;
      state.bookmarks = await loadBookmarks();
      render();
    };
    main.querySelectorAll("[data-del-bm]").forEach(function(btn){
      btn.addEventListener("click", async function(){
        if (!confirm("Supprimer ce favori ?")) return;
        await sb.from("bookmarks").delete().eq("id", btn.dataset.delBm);
        state.bookmarks = await loadBookmarks();
        render();
      });
    });

    var searchInput = document.getElementById("searchInput");
    if (searchInput) searchInput.oninput = function(){ state.searchQuery = searchInput.value; runSearch(searchInput.value); render(); };

    var authToggle = document.getElementById("authToggle");
    if (authToggle) authToggle.onclick = function(){ state.authMode = state.authMode === "login" ? "register" : "login"; state.authError = ""; render(); };

    var authSubmit = document.getElementById("authSubmit");
    if (authSubmit) authSubmit.onclick = async function(){
      var username = document.getElementById("authUsername").value.trim().toLowerCase();
      var password = document.getElementById("authPassword").value;
      state.authError = "";
      if (!username || !password){ state.authError = "Remplis tous les champs."; render(); return; }
      if (!/^[a-z0-9_]{3,20}$/.test(username)){ state.authError = "Identifiant : 3 à 20 caractères, lettres/chiffres/_ uniquement."; render(); return; }

      var email = username + FAKE_DOMAIN;
      state.authBusy = true; render();

      if (state.authMode === "register"){
        var pseudo = document.getElementById("authPseudo").value.trim();
        var password2 = document.getElementById("authPassword2").value;
        if (!pseudo){ state.authError = "Choisis un pseudo affiché."; state.authBusy=false; render(); return; }
        if (password.length < 4){ state.authError = "Mot de passe trop court (4 caractères min)."; state.authBusy=false; render(); return; }
        if (password !== password2){ state.authError = "Les mots de passe ne correspondent pas."; state.authBusy=false; render(); return; }

        var up = await sb.auth.signUp({ email: email, password: password });
        if (up.error){
          state.authError = up.error.message.indexOf("registered") !== -1 ? "Cet identifiant existe déjà." : up.error.message;
          state.authBusy = false; render(); return;
        }
        var newUserId = up.data.user.id;
        var profRes = await sb.from("profiles").insert({ id: newUserId, username: username, pseudo: pseudo });
        if (profRes.error){
          state.authError = "Identifiant déjà pris.";
          state.authBusy = false; render(); return;
        }
        state.session = up.data.session;
        state.profile = await loadProfile(newUserId);
      } else {
        var inr = await sb.auth.signInWithPassword({ email: email, password: password });
        if (inr.error){ state.authError = "Identifiant ou mot de passe incorrect."; state.authBusy = false; render(); return; }
        state.session = inr.data.session;
        try{ state.profile = await loadProfile(state.session.user.id); }catch(e){ state.profile = null; }
      }
      state.authBusy = false;
      state.posts = await loadPosts();
      state.bookmarks = await loadBookmarks();
      render();
    };

    var logoutBtn = document.getElementById("logoutBtn");
    if (logoutBtn) logoutBtn.onclick = async function(){ await sb.auth.signOut(); state.session = null; state.profile = null; state.bookmarks = []; render(); };

    var deleteAccBtn = document.getElementById("deleteAccBtn");
    if (deleteAccBtn) deleteAccBtn.onclick = async function(){
      if (!confirm("Supprimer définitivement ton compte ? Cette action est IRRÉVERSIBLE.")) return;
      deleteAccBtn.disabled = true;
      var animPromise = runEraseAnimation();
      var delPromise = sb.rpc("delete_my_account");
      var results = await Promise.all([animPromise, delPromise]);
      var delRes = results[1];
      if (delRes && delRes.error){
        deleteAccBtn.disabled = false;
        alert("La suppression a échoué : " + delRes.error.message + "\n\nVérifie que la fonction SQL delete_my_account a bien été créée dans Supabase.");
        return;
      }
      try{ await sb.auth.signOut({ scope: "local" }); }catch(e){}
      state.session = null;
      state.profile = null;
      state.bookmarks = [];
      state.tab = "forum";
      render();
    };
  }

  // ---------------- animation de suppression ----------------
  function runEraseAnimation(){
    return new Promise(function(resolve){
      var overlay = document.createElement("div");
      overlay.className = "erase-overlay";

      var embers = "";
      for (var i = 0; i < 16; i++){
        var left = 50 + (Math.random() * 70 - 35);
        var delay = (1.0 + Math.random() * 0.7).toFixed(2);
        var dur = (0.9 + Math.random() * 0.6).toFixed(2);
        embers += '<span class="erase-ember" style="left:' + left + '%; animation-delay:' + delay + 's; animation-duration:' + dur + 's;"></span>';
      }

      overlay.innerHTML =
        '<div class="erase-bomb">💣</div>' +
        '<div class="erase-flash"></div>' +
        '<div class="erase-ring r1"></div>' +
        '<div class="erase-ring r2"></div>' +
        '<div class="erase-ring r3"></div>' +
        embers +
        '<div class="erase-log" id="eraseLog"></div>';

      document.body.appendChild(overlay);

      var lines = ["ACCÈS AU COMPTE...", "PURGE DES DONNÉES...", "SUPPRESSION DÉFINITIVE...", "COMPTE EFFACÉ."];
      var logEl = overlay.querySelector("#eraseLog");
      var i2 = 0;
      var logInterval = setInterval(function(){
        if (i2 < lines.length){
          var line = document.createElement("div");
          line.textContent = "> " + lines[i2];
          logEl.appendChild(line);
          i2++;
        } else {
          clearInterval(logInterval);
        }
      }, 560);

      setTimeout(function(){
        clearInterval(logInterval);
        overlay.remove();
        resolve();
      }, 2700);
    });
  }

  document.querySelectorAll("nav.tabbar .tab").forEach(function(btn){
    btn.addEventListener("click", function(){ state.tab = btn.dataset.tab; state.openPostId = null; render(); });
  });

  init();
})();
</script>
